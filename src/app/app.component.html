<!-- Top Toolbar (desktop only) -->
<mat-toolbar *ngIf="!showMobileLayout()" color="primary">
  <span style="line-height: 2;">{{ title }}</span>
  <span class="spacer"></span>
  <app-balance-display></app-balance-display>
  <button
    *ngIf="showDesktopInstallAction()"
    mat-icon-button
    type="button"
    (click)="onInstallClick()"
    aria-label="Install app">
    <mat-icon>download</mat-icon>
  </button>
  <button
    mat-icon-button
    type="button"
    (click)="openSettingsDialog()"
    aria-label="Open settings">
    <mat-icon>settings</mat-icon>
  </button>
</mat-toolbar>

<main [class.mobile-layout]="showMobileLayout()">
  <app-timeline (scrollDirectionChange)="onScrollDirection($event)"></app-timeline>
</main>

<!-- Desktop Floating Action Button -->
<button
  *ngIf="!showMobileLayout()"
  mat-fab
  color="primary"
  class="fab-button"
  (click)="openAddEntryDialog()"
  aria-label="Add new entry">
  <mat-icon>add</mat-icon>
</button>

<!-- Mobile Install Banner -->
<section
  *ngIf="showMobileInstallBanner()"
  class="install-banner"
  aria-label="Install app banner">
  <div class="install-banner-copy">
    <strong>Install Money Stream</strong>
    <p *ngIf="showIosInstallHint()">
      On Safari, tap Share, then Add to Home Screen.
    </p>
    <p *ngIf="!showIosInstallHint()">
      Install for quick access in a dedicated app window.
    </p>
  </div>
  <div class="install-banner-actions">
    <button
      mat-flat-button
      color="primary"
      type="button"
      (click)="onInstallClick()">
      {{ installActionLabel() }}
    </button>
    <button
      mat-button
      type="button"
      (click)="dismissInstallBanner()">
      Not now
    </button>
  </div>
</section>

<!-- Mobile Bottom Navigation Bar -->
<nav
  *ngIf="showMobileLayout()"
  class="mobile-bottom-bar"
  [class.hidden]="!isBottomBarVisible()">

  <!-- Left: Settings -->
  <div class="bottom-bar-left">
    <button
      mat-icon-button
      type="button"
      (click)="openSettingsDialog()"
      aria-label="Open settings">
      <mat-icon>settings</mat-icon>
    </button>
    <span>Settings</span>
  </div>

  <!-- Center: Elevated FAB -->
  <div class="bottom-bar-center">
    <button
      mat-fab
      class="center-fab"
      (click)="openAddEntryDialog()"
      aria-label="Add new entry">
      <mat-icon>add</mat-icon>
    </button>
  </div>

  <!-- Right: Balance Display -->
  <div class="bottom-bar-right">
    <app-balance-display></app-balance-display>
  </div>
</nav>
